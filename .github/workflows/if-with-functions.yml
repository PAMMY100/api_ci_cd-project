name: Nice if example
on: 
    push:
        branches:
            - main
            - develop
            - feature/**
jobs:
    quality_checks:
        if: startsWith(github.ref_name ,'feature/xyz') && github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
            - name: Perform code quality
              run: echo "Performing code quality checks..."
    dev_deploy:
        if: github.ref_name == 'develop' && github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
            - name: Dev Deploy
              run: echo "Deploying the code to development environment..."
    prod_deploy:
        if: github.ref_name == 'main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
            - name: Prod Deploy
              run: echo "Deploying the code to production environment..."
    success_notification:
        needs: [quality_checks, dev_deploy, prod_deploy]
        if: always() && !failure()
        runs-on: ubuntu-latest
        steps:
            - name: Send Success Notification
              run: echo "Build and deployment successful! Sending notification..."
    failure_notification:
        needs: [quality_checks, dev_deploy, prod_deploy]   
        if: failure()
        runs-on: ubuntu-latest
        steps:
            - name: Send Failure Notification
              run: echo "Build or deployment failed! Sending notification..."